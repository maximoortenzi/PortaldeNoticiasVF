<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Noticias</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>Portal de Noticias</h1>

        <div>
            <button id="themeBtn">🌙 Tema</button>
            <a href="login.html">Login</a>
        </div>
    </header>

    <section id="dolar"></section>

    <section id="conversor">

        <h2>Conversor de Moneda</h2>

        <input
            type="number"
            id="montoInput"
            placeholder="Ingrese un monto">

        <div style="margin-top:15px;">

            <button id="usdToArsBtn">
                USD → ARS
            </button>

            <button id="arsToUsdBtn">
                ARS → USD
            </button>

        </div>

        <p id="resultadoConversion"></p>

    </section>
    <section id="clima">
        <h2>Clima: <span id="ciudadNombre">Rosario</span></h2>
        <div id="climaInfo">Cargando...</div>
        <div style="margin-top:15px;display:flex;gap:10px;">
            <input type="text" id="inputCiudad" placeholder="Cambiar ciudad..." style="flex:1;padding:8px;border:1px solid #ccc;border-radius:8px;">
            <button id="btnCambiarCiudad" style="padding:8px 15px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;">Buscar</button>
        </div>
    </section>

    <section id="noticias"></section>
    <script src="js/clima.js"></script>
    <script src="js/noticias.js"></script>
    <script src="js/dolar.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
